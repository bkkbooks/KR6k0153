body:
  text: 清金陵寶華山律學沙門德基輯卷第一姚秦者即東晉安帝時後主姚秦以別餘秦也揀非周後之嬴秦亦非西晉武帝時之乞伏秦亦非東晉穆帝時之符秦故言以別餘秦也言嬴秦者因秦祖堯帝時加賜伯益賜姓嬴氏故稱鸁秦言乞伏秦號曇牟讖者即乞伏氏或云乞佛氏姓也據金城苑川金城即陝西臨洮府別號金城苑川即陝西鳳翔府寶雞縣別號苑川自號西秦當晉武帝太元十二年名曇牟讖亦云曇摩讖亦云曇無讖此云法豐以道法豐盛故為名即中印土人也言符秦者姓符名堅字永固自稱大秦故曰符秦也嗣音寺繼也五明一聲明聲即教明即明了謂世間文章算數建立之法皆悉明了通達故曰聲明二因明因即萬法生起之因謂世間種種言論及圖書印璽地水火風萬法之因悉皆明達故曰因明也三醫方明醫方即醫治之法也謂世間種種病患或癲癎蠱毒四大不調鬼神呪詛寒熱諸病皆悉曉了其因通達對治故曰醫方明也四工巧明工即工業巧即巧妙謂世間文詞讚詠乃至營造城邑農田商賈種種音樂卜算天文地理一切工業巧妙皆悉明了通達故曰工巧明五內明內即佛法內教也謂以持戒治破戒以禪定治散亂以智慧治愚癡乃至種種染淨邪正生死涅槃對治之法皆悉明了通達故曰內明靡音米無也綜宗去聲機縷乃織錦之具也雖錦絲萬億經緯由之提掇間轄平聲孟子曰間先聖之道也薨音轟公侯卒為之薨羇音雞旅寓也寄也羇旅之臣幸若獲宥寬之而已未全放也虜音魯掠也生得曰虜斬首曰獲徵音征證也微音惟細也使微細言義不墜也馳音池疾驅也車馬曰馳走馬謂之馳䇿馬謂之驅脫湍入聲或然之辭幾音雞幾者動之微吉之先見者也敦喻敦音墩厚也喻音于言語順貌趙政為前秦符堅祕書郎時外國沙門僧伽跋澄及曇摩難提入長安政請跋澄出婆須蜜經梵本於是澄執梵文竺佛念譯為晉言弘始即後秦弘始後秦姓姚名萇字景茂赤享羌人為前秦符堅龍驤將軍以攻晉後為司馬討慕溶泓等軍敗懼奔時渭北馬牧等糾扇羌豪五萬餘人推萇為盟主晉太元十二年丙戌四月萇自陝西等路入長安即帝位改年建初國號大秦史以後秦別之晉太元十八年癸巳十二月萇卒子興立改元皇初凡五年又改元弘始故曰後秦弘始弱音若二十曰弱冠通敏通徹也音閔聰也即通徹聰敏也詁訓詁音古詁訓者通古今之言而明其故也尤音由甚也備貫上音避具足也下音慣習也即具足貫習風俗西河山西省汾州府別號西河洽音狹合也著音注明也質斷質真入聲考也證也斷端去聲決也即考證決斷文義也研核上音延窮也究也下音劾考之使實也遘音姤遇也即遇疾八風出佛地論得可意事名利失可意事名衰不現誹撥名毀不現讚美名譽現前讚美名稱現前誹撥名譏逼惱身心名苦適悅身心名樂五停心者修此五法煩惱止息心不動散發諸禪定定法持心入出安隱故名停心一多貪衆生不淨觀謂多貪欲之人於男女身分互相染著須假作九想不淨之觀治之令其貪著之心不起故云多貪衆生不淨觀二多瞋衆生慈悲觀謂多瞋恚之人於諸違情境輒生忿怒當用慈悲觀治之愛念愍傷一切衆生不於彼而起瞋心故云多瞋慈悲觀三散亂衆生數息觀謂心多散亂之人當用數息治之數息者以鼻中出入之息或數出息或數入息端心正念從一至十不多不少周而復始令心不散亂故云多散衆生數息觀四愚癡衆生因緣觀謂愚癡不了之人當以因緣觀治之因緣觀者即觀十二因緣也以其迷倒撥無因果執著斷常二見故令觀此十二因緣三世相續不斷不常以破愚癡之心故云愚癡衆生因緣觀五多障衆生念佛觀謂障重之人當用念佛觀治之障有三種一昏沉暗塞障當想念應身佛三十二相相相分明以治於昏沉也二惡念思惟障當想念報身佛十力四無所畏治之三境界逼迫障當想念法身佛空寂無為治之故云多障衆生念佛觀別相念即身受心法釋在十一支道中總相念者觀身不淨則受心法亦皆不淨觀受是苦則身心法亦皆是苦觀心無常則身受法亦皆無常觀法無我則身受心亦皆無我總於四境而修四觀用破倒令無餘也四加行亦名四善根此四通言加行者謂此行人欲求見道革凡成聖遂起暖等四心修四諦觀以定資慧加功用行故名四加行見道即初果須陀洹也一暖加行暖者從喻得名謂如人以木鑽火火雖未出先得暖相譬此加行位中以智慧火燒煩惱薪雖未得無漏之智已得智火之前相故名暖加行無漏者謂不漏落三界生死也二頂加行頂者謂觀行轉明在暖之上如登山頂觀曯四方悉皆明了故名頂加行觀矚四方者謂觀四諦也三忍加行忍有二義一者印可義謂於此位中即能印可四諦之理謂苦諦實是苦乃至道諦實是道也二者決定義謂此善根決定無退故名忍加行四世第一加行謂此位中觀四諦理雖未能證而於世間最勝故名世第一加行三乘乘即運載之義謂聲聞緣覺菩薩各以其法為乘運出三界生死同到真空涅槃故名三乘三界者欲界色界無色界也梵語涅槃華言滅度一聲聞乘聞佛聲教而得悟道故曰聲聞謂其知苦斷集慕滅修道故以此四諦為乘也四諦者苦集滅道也二緣覺乘因觀十二因緣覺真諦理故名緣覺謂始觀無明緣乃至老死此是觀十二因緣生次觀無明滅乃至老死滅此是觀十二因緣滅觀此因緣滅即悟非生非滅故以此十二因緣為乘也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三菩薩乘菩薩是梵語具云菩提薩埵華言覺有情謂覺悟一切有情衆生也菩薩行六度行廣化衆生出離生死故以此六度為乘也六度者一布施二持戒三忍辱四精進五禪定六智慧也三智一一切智謂於一切內法內名能知能解一切外法外名亦能知能解是名一切智即聲聞緣覺之智也內法內名者謂理內所詮法相及能詮名字蓋佛教依理而說故名理內也外法外名者即理外所詮法相及能詮名字蓋外道等違理橫計故名理外也二道種智謂能用諸佛一切道法發起衆生一切善種是名道種智即菩薩之智也三一切種智謂能以一切種智知一切道知一切種是名一切種智即佛之智也三諦諦者諦審也謂諦審一切法即空即假即中即空是真諦即假是俗諦即中是中諦此三隔歷即是次第三諦三一無礙即是圓融三諦隔歷者三諦不互融也次第者前真次俗後中即別教三諦也圓融者舉一即三全三是一即圓教三諦也一真諦真即真空泯一切法之謂也蓋諸法本空衆生不了執之為實而生妄見若以空觀蕩之則謂實之情自忘情忘即能離於諸相若離則真空之理自然諦了故名真諦也二俗諦俗即世俗立一切法之謂也諸法雖即本空皆不可得若以假觀照之則能諦了性具諸法歷歷宛然故名俗諦三中諦中即中正統一切法之謂也諸法本來不離二邊不即二邊若以中觀觀之則能諦了諸法非真非俗即真即俗清淨洞徹圓融無礙即一而三即三而一不可思議故名中諦四韋陀摩蹬伽經云初人梵天造一韋陀次有仙人名曰淨變一為四故名四韋陀梵語韋陀華言智論即婆羅門所作邪論也以世間之智造養生等書而有四種不同故名韋陀典其書不曾傳至東土一阿由梵語阿由華言方命亦曰壽養生繕性之書也繕者治也二殊夜梵語殊夜無翻祭祀祈禱之書也三婆磨梵語婆磨無翻謂禮儀占卜兵法軍陳之書也四阿達婆梵語阿達婆無翻謂異能技數禁呪醫方之書也渺音藐大水也詳悉詳者備也悉者盡也知也豈我備詳盡知也如意珠亦名摩尼或云踰摩正云末尼大品云如摩尼寶若在六中隨作一色以青物褁水色即青若黃赤白紅縹褁隨作黃等色大品阿難問憍尸迦是摩尼寶為是天上寶為是閻浮提實釋提桓因言是天上寶閻浮提人亦有是寶但功德相少不具足大論云有人言此寶珠從龍王腦中出人得此珠毒不能害入火不燒輔行曰亦云如意似如唐梵不同大論華嚴云如意摩尼似如並列二名大莊嚴論有摩尼珠大如膝蓋大論云如意珠狀如芥粟又云如意珠出自佛舍利若法沒盡時諸舍利皆變為如意珠觀經指如意為摩尼天台云摩尼者如意也禦音御止也拒也淩音靈犯也魄音拍月體黑者謂之魄又魄者無明也無明盡則惑忘宜音倪適理也即如理之意九界破結使比丘中廣明欲界六天欲即色欲四天王以形交為欲忉利以風為欲夜摩以抱持為欲兜率以執手為欲化樂以視笑為欲他化但以視為欲也謂之天者天然自然樂勝身勝亦名最勝亦名光明以其所欲不同故名六欲天四天王天離人間地四萬由旬每由旬四十里居須彌山腰七金山頂與日月齊有四王天東方持國天王居須彌黃金埵主乾闥婆衆南方增長天王居須彌山琉璃埵主鳩槃茶衆西方廣目天王居須彌山白銀埵主龍衆北方多聞天王居須彌山水晶埵主夜叉衆統御諸惡鬼神令其不敢肆虐故名護世四王并其眷屬總名四天王也此是上品十善所感或是不殺戒增上功德所感或是一日一夜齊戒之力所感身長七十五丈以人間五十年為一晝夜壽五百歲計人間數則是九百萬年然亦有中夭者死時五衰相現一頭上花萎二腋下出汗三衣裳垢染四身體臭穢五不樂本座忉利天離人間地八萬由旬居須彌山頂名忉利天是梵語此翻三十三天謂須彌山頂上四方各有八天並列而住為之三十二并中間帝釋天王共為三十三也大論云昔有婆羅門姓憍尸迦與知友三十二人共修福德命終皆生須彌山頂憍尸迦為天王各帝釋天三十二人為輔臣此亦上品十善所感或是不殺不盜兩戒增上功德所感或是一日一夜齊力所感天身皆長百五十丈唯帝釋身長三百丈由其過去遍修恭敬業故以人間百年為一晝夜壽一千歲計人間數則是三千六百萬年中夭及五哀相現并如前說後諸天中亦皆准知梵語憍尸迦又云釋提桓因華言能天主言帝釋者華梵雙舉也夜摩天離忉利天八萬由旬離人間地十六萬由旬於虗空中有地如雲朗然安住為夜摩天此翻時分謂其時時唱快樂故以蓮花開合分其晝夜此是上品十善兼學坐禪所感或是不殺不盜不邪淫三戒增上功德所感或亦八戒十戒等功德所感身長二百二十五丈以人間二百年為一晝夜壽彼天二千歲兜率天離夜摩天十六萬由旬離人間三十二萬由旬於虗空中有此如雲上升精微不接下界諸人天境為兜率天此翻知足謂夜摩天極受欲界妙五欲樂不知止足此天能知足也此是上品十善兼得細住所感或是身三口四七支戒品增上功德所感或亦八戒十戒等力所感身長三百丈以人間四百年為一晝夜壽彼天四千歲五欲者色欲聲欲香欲味欲觸欲也細住者六妙門四修觀中一法也自覺身心泯然入定不見內外相貌定法持心任運不動於定心中以心眼諦觀此身中微細出入息相故名兼得細住化樂天離兜率天三十二萬由旬離人間六十四萬由旬於虗空中有地如雲超越下地能為變化謂自化五塵之欲而娛樂故名化樂天此是上品十善兼成欲界中定所感身長三百七十五丈以人間八百年為一晝夜壽彼天八千歲五塵者色塵聲塵香塵味塵觸塵也他化自在天離化樂天六十四萬由旬離人間一百二十八萬由旬於虗空中有地如雲假他所化以成己樂故名他化自在此是上品十善兼成未到地定所感身長四百五十丈以人間一千六百年為一晝夜壽彼天一萬六千歲色無色界天色界諸天具有色受想行識五陰無色界天唯有受想行識四陰梵衆天超六欲天遠離飲食淫欲睡眠三種過患故名為梵梵者清淨離染之謂也通而言之四禪皆名梵天皆清淨故別而言之初禪創離欲染獨得梵名大佛頂經云愛染不生無留欲界是人應念身為梵侶名梵衆天壽二十小劫身半由旬梵輔天大佛頂經云欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德名梵輔天壽四十小劫身一由旬大梵天大佛頂經云身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王壽六十小劫身由旬半少光天不論人中天上欲界初禪但於無覺唯觀三昧不住不著專精求進創得無覺無觀三昧入第二禪禪力夫深命終得生少光天中佛頂經所謂澄心不動寂湛生光也火災不到壽一大劫身二由旬從二禪去乃至非非想定一切皆名無覺無觀三昧無量光天人中天上數習第二禪力命終得生此天佛頂經所謂光光相然照耀無盡映十方界遍成琉璃者也壽四大劫身四由旬光音天人中天上深入第二禪力兼修四無量心命終得生此天佛頂經所謂吸持圓光成就教體發化清淨應用無盡者也壽八大劫身八由旬少淨天不論人中天上梵天光天但於二禪不住不著一心精進創證第三禪者命終即生此天水災不到壽命十六大劫身長十六由旬無量淨天數修第三禪力命終得生此天壽三十二大劫身三十二由旬遍淨天深入第三禪力兼修四無量心命終得生此天壽六十四大劫身六十四由旬福生天不論人中天上初二三禪但於三禪不味不著一心精進創證第四禪者命終得生此天果報微妙宮殿隨身并如雲之地亦所不須故他經中亦名為無雲天也三災俱不能到壽一百二十五大劫身一百二十五由旬福愛天數修第四禪力命終得生此天壽二百五十大劫身二百五十由旬廣果天深入第四禪力兼修四無量心命終得生此天壽五百大劫身五百由旬無想天由於人中天上秉外道邪說厭患粗想數修習力伏除欲界初二三禪貪染依第四禪滅除前六識心心所法令不現行想滅為首名無想定得此定已不退不失命終即生無想天中壽亦五百大劫身亦五百由旬無煩天此於第四禪捨念清淨衆同分中復有此五不還天乃三果聖人已斷下四地染未斷上地染者所寄居也初無煩者乃雜修禪下品所感謂行人先入第四禪已於此定中先起多念無漏心相續現前次起多念有滿心相續現前又起多念無漏心相續現前如是漸漸減至二念無漏二念有漏二念無漏時名雜修加行成滿次起一念無漏一念有漏一念無漏名為根本成滿以用無漏夾熏有漏色定轉明果報轉勝由此資於故業故命終後得生此天壽千大劫身千由旬但有升進永不退轉也一遇佛字便出塵界成阿羅漢無熱天二無熱者乃雜修禪中品所感用前下品根本三心為加行更引一念無漏一念有漏一念無漏三心為根本資其故業即生此天壽二千大劫身二千由旬善見天三善見者乃雜修上品所感用前六心皆為加行更引三心為根本資其故業得生此天壽四千大劫身四千由旬善現天四善現者乃雜修上勝品所感用前九心皆為加行更引三心為根本資其故業得生此天壽八千大劫身八千由旬色究竟天五色究竟天者乃雜修禪上極品所感用前十二心皆為加行更引三心為根本資其故業得生此天壽一萬六千大劫身一萬六千由旬空無邊處天不論人中天上初二三四禪中但除無想五不還天餘修空處定者若得成就則命終便生此天既無色陰不可說有方隅處所唯有微細第六意識所緣無邊虗空為其處也壽四萬大劫識無邊處天不論欲界色界空處但修識處定成命終即生此天唯以微細第六意識所緣無邊心識為其處也壽四萬大劫無所有處天不論欲界免界空處識處但修無所有處定成命終即生此天唯以微細第六意識所緣非空非識境界為其處也壽六萬大劫非想非非想處天不論欲色二界空等三處但修非非想處定成命終即生此天唯以極微細第六識所緣非有非無境界為其處也壽八萬大劫居三有極頂更無可進東勝神洲語梵弗于逮華言勝身以其身勝南洲故也又翻為初謂日初從此出也在須彌山東其土東狹西廣形如半月從廣九千由旬人面亦如半月之形人身長八肘壽二百五十歲梵語須彌華言妙高南贍部洲梵語閻浮提華言勝金閻浮提樹提是洲名因樹立稱故名閻浮提在須彌山南其土南狹北廣形如車箱縱廣七千由旬人面亦像地形壽無定限劫初成時壽無量歲減劫極時不滿十歲增劫極時八萬餘年今時人壽不滿百歲仍多中夭故論果報不及東洲何況西北二洲然有三事尚勝諸天何況北洲一能斷淫二識念力三能精進所以諸佛唯出南洲也西牛貨洲梵語瞿耶尼華言牛貨謂彼多牛以牛為貨故名牛貨在須彌山西其土形如滿月縱廣八千由旬人面亦如滿月人身長六十肘壽五百歲然有中夭此洲能起見思煩惱造三品惡雖不見佛而有阿羅漢往彼說法教化故得遵修出世施戒禪慧北俱盧洲梵語單越此翻勝處亦翻高上比餘三洲地最高上福最勝故在須彌山北其土正方猶如池沼縱廣一萬由旬人面亦像地形人身長三十二肘人壽一千歲命無中夭不執我所不造十惡命終必生天上但以純樂無苦不畏無常佛法所不能化故為八難之一轄間入聲車軸頭鐵也左傳巾車脂轄軸音逐車持輪者即轂也下下等九品思惑謂三界九地思惑每地各分九品合為八十一品下下九品者即最後第九品斷此下下第九品惑盡永不退故隨順有為無為一有餘涅槃謂見思煩惱已斷尚餘現受色身未滅是名有餘涅槃二無餘涅槃謂見思二惑與所受五衆之身俱得滅盡無有遺餘是名無餘涅槃第二卷砥音紙磨石也周道如砥頌周文王之德公平如砥也故言有道砥直謂有道平直也羸音雷瘦也五鈍使一貪欲使貪即引取無厭也謂諸衆生貪著世間色欲財寶恣縱心情而無厭足由此貪惑之所驅役流轉三界二瞋恚使瞋即忿怒謂諸衆生於違情境上起諸瞋恚惱亂自他由此瞋惑之所驅役流轉三界三無明使無明即迷惑不了乃癡惑也謂諸衆生以迷心緣境於一切法不能明了由此癡惑之所驅役流轉三界四慢使慢即自恃輕他也謂諸衆生自恃種姓富貴有德有才輕蔑於他由此慢心之所驅役流轉三界五疑使疑即猶豫不決也謂諸衆生迷心乖理不能通達法相由此疑惑之所驅役流轉三界故名為使五利使一身見使身見者謂諸衆生於名色五陰十二入十八界中妄計為身也由此身見驅役心神流轉不息二邊見使邊見者謂諸衆生於前之身見或執為斷或執為常各執一邊也由此邊見驅役心神流轉不息三邪見使邪見者謂諸衆生邪心取理撥無因果斷滅一切善根也由此邪見驅役心神流轉不息撥者絶也四見取使見取者謂諸衆生於諸見之中隨執一見於非真勝法中謬計涅槃生心取著於邪見中執為正見也由此見取驅役心神流轉不息五戒取使戒取者謂諸外道於非戒中謬以為戒無利勤苦所依為業如牛狗雞等邪戒及投灰拔髮五熱炙身斷絶飲食以為真戒取以進行也乃至雖受佛戒志求生天作輪王等皆屬戒取所攝由此戒取驅役必神流轉不息故名為使俱舍問云下三諦何意無身邊二見答身邊二見唯於苦果處執身為我名為身見執身斷常名為邊見三諦非身故無二見問戒取之人何故迷苦道二諦耶答戒體是苦取以為淨故述苦諦邪戒非道取以為道故迷道諦問何以戒取集滅處無答戒取有二一非因計因迷苦果起二非道計道迷道起故集滅無也集滅離三見者身邊二見及戒取身是苦本見苦諦時已斷邊見依身故亦隨斷集諦不計道非道為道滅諦又非修行之位故皆無戒取可斷也獨音瀆單也孤也老而無子曰獨無夫無子故曰單獨伺音四候也察也即伺候察訪淫戒楞嚴經云若諸世界六道衆生乃至塵不可出淫為生死根本反之則不續矣圓覺云一切衆生皆因淫欲而正性命當知輪回愛為根本由諸欲助發愛性是故能令生死相續縱有禪定乃至魔女魔不斷淫而修禪定魔定順惑易得成就功深者為上品功淺者為中下雖不斷欲而修定修福隨福優劣故成三品以邪定力報得五通以有漏福生天魔界隨得少定不辨邪正各各自謂成無上道犯四禁罪墮在地獄今以修禪之功且落魔鬼等道若約未來輪轉則應備歷三塗垣音員墻也卑曰垣高曰墉柵音折編木為之又音訕籬也絆音半繫足曰絆繫首曰羈杻械上音丑手械也下音解乃器仗之總名也邏羅去聲巡也遮也耽答平聲嵐音婪鸜鵒上音渠下音育此言八哥魯昭公二十五年春鸜鵒來巢里兒剔其舌端教以語言甚慧杙音亦橛也樴也刳音枯剖也瓠音胡鰐音諤鼉音陀水蟲類魚有足長丈餘甲如鎧皮堅厚可冒鼓睿音胃深明通達窣孫入聲徙西上聲遷移也弭音米稅水去聲以物遺人曰稅儉箝上聲少也歲歉也盜戒楞嚴經云若諸世界六道衆生其心不偷乃至生死相續不與取起心即犯故云其心不偷禪智現前貪盜不除縱止淫殺亦落邪道精靈妖魅及諸邪人皆能惑亂令衆歸附不惜衣食盡命供給若不修禪直入地獄精靈妖魅豈越塵勞而屬五家一水二火三盜賊四惡兒五官家也第三卷瘀音飫血雍病也黤音黶青黑色泯音閔滅也盡也三種色一可見有對色可見有對色者即一切色塵也謂世間之色眼則可見有對於眼故也二不可見有對色不可見有對色者即五根四塵也謂眼識不可見而能對色耳識不可見而能對聲鼻識不可見而能對香舌識不可見而能對味身識不可見而能對觸皆言勝義根也三不可見無對色不可見無對色者即無表色也謂意識緣於過去所見之境名為落謝五塵雖於意識分別明了皆不可見亦無表對故也螫音釋蟲行毒陷咸去聲墜墮也鑿曹入聲穿孔也桁音杭械也械夾足及頸皆曰桁弶強去聲設罟於道以掩鳥獸也摾與弶同撥般入聲發也龍子梵語那伽此云龍罵意經云是四因緣一多布施二多瞋恚三輕傷人四自貢高海龍王經云龍王白佛言我從劫初止住大海從拘樓秦佛時大海中妻子甚少今者龍王眷屬繁多佛告龍王其於佛法出家者違犯戒行不捨破戒者多生龍中直見不墮地獄拘樓秦佛九十八億拘那含牟尼佛八十億迦葉佛六十億於我世中九百九十億今已有生者以是之故在大海中妻子眷屬不可稱計阿修羅秦言不飲酒有大勢力常與天共鬬舊翻無端正謂男醜女端正新翻非天此神果報最勝鄰次諸天又名阿素洛素洛是天彼非天故名阿素洛又素洛名端正彼非端正名阿素洛舊曰阿修羅阿須論皆訛也犍闥婆此云香陰亦云凌空之神不噉酒肉惟香資陰天帝樂神也前生亦少瞋恚常好布施今作此神夜叉此云勇健又云暴惡什曰秦言貴人亦言輕健有三種一地行二虗空三天夜叉亦多瞋狼戾好嗜酒肉而行布施墮地行夜叉若人剛愎強梁而行布施車馬代步墮空行夜叉若人妬心好諍而能以好房舍臥具衣服飲食布施故生飛行夜叉中義翻疾行其行速疾一念能百千由旬有光迅速如流世人謂之流星口中出烟世人謂之星墼音吉土墼未燒磚坯也殺戒楞嚴經云又諸世界六道衆生乃至塵不可出等相殺相償結讐連禍苟或止之故不相續帶殺修禪報為神道功深福厚為大力鬼即五嶽四瀆係祠祀者功淺福劣列在中下八部所管及大海邊羅剎國類因修定故皆有業通迅疾無礙不斷殺故受此鬼趣為天驅役若不修禪及不修福但行殺害直入地獄無此差降鬼神多殺不免苦輪殺生食肉是衆生冤如何不斷得菩提路無有是處五嶽者衆山之宗高而尊也霍山即天柱山為衡山衡山南嶽也東嶽泰山在究州西嶽華山在弘農河南省河南府陝州別號弘農北嶽恆山在定州中嶽嵩山在頴州四瀆者江河淮濟為四瀆也江水出岷山河水出積石山自乾位來千里一曲九曲而入海淮水出河南汝寧府信陽縣至直𨽻淮安府安東縣入海濟水出常山岷音民山名岷山在岷州溢洛南一里連綿至蜀二千里皆曰岷山辨才名四無礙智謂菩薩於此四法智慧明了通達無滯故名四無礙智以其辨說融通亦名四無礙辨才一義無礙智謂菩薩了知一切諸法義理通達無滯故名義無礙智二法無礙智謂菩薩通達一切諸法名字分別無滯故名法無礙智三辭無礙智謂菩薩於諸法名字義理隨順一切衆生殊方異語為其演說能令各各得解辨說無礙故名辭無礙智四樂無礙智謂菩薩隨順一切衆生根性所樂聞法而為說之圓融無滯故名樂說無礙智勵音例勉力也人陰五陰者色受想行識也法界次第云次名色而辨五蘊者以迷惑偏重故大聖教門開名為四心對色合為五也仁王經云色名色蘊心名四蘊通稱蘊者以積聚為義隱覆出世真明性慧而增長生死積聚不絶故名為五蘊至漢以來翻經為陰陰者蓋覆義吾人心之異名也衆生由此五法積聚成身復因此身積聚有為煩惱等法能受無量生死也一色陰有形質礙之法名之為色謂眼耳五根和合積聚而成二受陰領納所緣名之為受受有六種從六塵相觸而有意根為內受五根名外受六根受名內外受於一根中有違有順不違不順受於順生樂受於違生苦受不違不順生不苦不樂受三想陰能所領之緣相應名之為想想有六種意識與六塵取領相應之相和合積聚而成六想也如意識著色想色與著聲想聲等四行陰行者遷流造作之義造作之心能趨於果名之為行行有六種大品經中說六為思意識思想諸塵造作善惡諸行和合積聚故五識陰了別所緣之境名為識眼耳六識於識諸塵境了了分別和合積聚故生從識結滅從色除生者生相無明滅者滅相無明金剛後心成佛方斷菩薩利生由此未斷從識結者由識而想而行而識也如人穿衣自內而外如人解衣自外而內也三昧經云五陰本無所有隨處所著即為陰成敗如幻一切無知知是者計無所有矣人入六入者內六根外六塵根塵相偶識入其中名入入以涉入為義以根塵相對則有識生識依於根塵則為能入根境俱為識之所入又有二義一根境互相涉入二根境俱為識之所入以是諸經名十二入便於初學故楞嚴經云以根為入者蓋根有勝義根親能生識又根能受境故偏名入又云六為賊媒自劫家寶法界次第云以二根六塵分內外親疏二皆名入謂內六入名根者此之六法親故屬內為識所依故名入根以能生為義眼耳鼻舌身意並有能生識之功故通名為根外六入名塵者此之六法疏故屬外為識所遊涉故名為入塵以染污為義以能染污情識故通名塵又云青黃赤白方圓長短烟雲塵霧等名色入鼓瑟悲喜風雨等名聲入香花葉果等名香入酸甜苦辛為味入冷暖輕重粗細澀滑為觸入受想覺觀貪恚癡生死老病正身正命為法入三昧經云入猶空野以所受樂謂云為入其入虗空無積處若知本來身淨計無所入矣人界十八界者界即界分謂衆生心色俱迷故開色為十界開心為八界令其觀此色心二法皆從虗妄因緣而生起惑造業輪轉生死若達妄源無有實體絶名離相不為惑染所迷也開色為十界者謂眼耳鼻舌身五根色聲香味觸五塵皆屬於色故開為十也開心為八界者謂眼耳鼻舌身意識及意根法塵者屬於心故開之為八也一眼界謂能見之根名為眼界二耳界謂能聞之根名為耳界三鼻界謂能嗅之根名為鼻界四舌界謂能嘗味之根名為舌界五身界謂能覺觸之根名為身界六意界謂能覺知之根名為意界七色界謂眼所見一切色境名為色界八聲界謂耳所聞一切音聲名為聲界九香界謂鼻所嗅一切香氣名為香界十味界謂舌所嘗一切諸味名為味界十一觸界觸即觸著謂身所覺冷暖細滑等觸名為觸界十二法界謂意所知一切諸法名為法界十三眼識界謂識依眼根而能見色名為眼識界十四耳識界謂識依耳根能聞諸聲名為耳識界十五鼻識界謂識依鼻根能嗅諸香名鼻識界十六舌識界謂識依舌根能嘗諸味名舌識界十七身識界謂識依身根能覺諸觸名身識界十八意識界謂識依意根而能了別一切法相名意識界謂五陰六入十八界皆是凡愚之法故云人法也十一支道一支道者謂身念處依身始觀是名身念處如淨眼人於一門倉觀見諸穀胡麻米豆如是比丘觀此身中從頂至足皆是不淨觀此身中但有髮毛爪齒乃至骨髓如是憶念多修習得須陀洹果乃至阿羅漢果是名一支向涅槃道復次比丘觀三根集業貪根集業恚根集業癡根集業若貪作業貪共貪緒貪集貪因貪緣身口意是非聖業是有漏業是集非滅瞋恚愚癡亦如是若成就此業父母具足有漏心向陰欲受生彼陰滅處母胎初生識有色共彼識四大所造色謂色由意生受想思觸謂名如是色共生共起彼不從東南西北四維上下來不從父母出不從業出亦非餘處出因衆緣和合因集因業因業父母出如春後月無有雲霧日中時有人持火珠以乾牛糞坌上便有火生有光出如是觀火不從東方乃至不從牛糞中出如是衆緣和合火生光出比丘如是觀名色不從東方乃至不從業出衆緣和合因集因業因業父母生便有名色七日時是胎始膜後七日如雲復七日初肉復七日始堅乃至四十九日身支節具足若母懷妊或九月十月愛護重身己便生子母以血養聖教以母乳為血也復便能食能食已諸根增長諸根增長已如是漸漸髮白面皺多諸苦患死命迫促以如是方便知法無常有為緣生盡法變法離法滅法我所非我有我非我所有我我所皆無有我如是慧者正觀不放逸勤念正知若依貪妄想斷斷己內心正住正止獨處定此念多修習得須陀洹果乃至阿羅漢果是名一支向涅槃道復次比丘如是思惟人有眼耳鼻舌身意假名為人眼耳鼻舌身意非人離眼耳鼻舌身意亦非人若如是法正生正成就正出假名為人如舍有梁椽牆壁非舍離梁椽牆壁亦非舍若如是法正生正成就正出假名為舍比丘緣木緣竹緣繩索緣泥圍繞虗空假名為舍比丘如是緣骨緣筋緣血肉緣皮膚圍繞虗空假名為我人以如是方便知此法無常有為緣生盡法變法離法滅法我所非我有我非我所有我我所皆無有我如是正慧見如是不放逸勤念正智寂靜行依貪妄想斷斷己內心正住正止獨處定如實念憶念此念多修習得須陀洹果乃至阿羅漢果是名身念處一支向涅槃道復次比丘如是思惟緣有眼假名為我無眼亦不假名為我眼非我離眼若是我眼應當有異以眼非我故眼無有異若無眼亦不假名為我以眼非我離眼亦非我以是故緣眼假名為我無眼亦不假名為我耳鼻舌身意亦如是如世尊說眼為我者此事不然耳鼻舌身心亦復如是如是慧者正觀不放逸勤念正智若依貪妄斷斷己內心正住正止獨處定此念多修習得須陀洹道乃至何羅漢果是名一支向涅槃道即前文自言念在身正憶念也二支道者定慧二支道也何謂定煩惱未斷者欲染斷正斷寂靜瞋恚愚癡煩惱障礙覆蓋諸縛惡行滅正滅寂靜如秋時多起塵土雲霧即時雨墮滅塵土雲霧正滅寂靜定亦如是何謂慧如實人若智分別色如實分別色受想行識亦如是如明眼人上高山頂若觀東方如實分別南西北方如實分別如是慧分別色受想行識是名慧是名二支向涅槃道三支道者三三昧三解脫門已釋本文故不重出四支道者一身念處頭等六分四大五根假合故名為身是中觀身智慧為念明見內身五種不淨破淨顛倒即是處也五種不淨者一種子不淨有二一者內種謂觀此身從昔煩惱生二者外種謂攬父母遺體而成此身以是觀之此身內外因種實為不淨大智度論云是身種不淨非餘妙寶物不從白淨生但從穢中出是也二住處不淨謂觀此身十月在於母胎生藏之下熟藏之上臭穢中住實為不淨大智度論云是身如臭穢不從華間生不因瞻蔔有又不出寶山是也三自體不淨謂觀此身以四大不淨所成猶如世間飲食不可久停終成不淨設以四大海水傾洗此身終無香潔大智度論云地水火風質能變成不淨傾海洗此身不能令香潔是也四外相不淨謂觀此身現見外相皆是不淨九孔常流種種穢惡如眼出眵淚耳出結矃鼻出膿涕口出涎唾大小便道不淨常流如破皮囊滿盛不淨大智度論云種種不淨物充滿於身中常流出不止如漏囊盛物也五究竟不淨謂觀此身非唯現在不淨審實思惟至於死後捐棄塜間爛壞臭穢尤極不淨大智度論云審諦此身必歸於死處是也觀外身內外身亦如是是為身念處二受念處謂六觸因緣生六受從六受生三受名之為受是中觀智慧名之為念明達三受皆苦破樂顛倒即是處是為受念處三心念處六識能識諸塵分別攀緣謂之為心是中觀內心智慧名之為念了知心從緣生剎那不住念念生滅破常顛倒即是處也是名心念處也四法念處想行二陰及三無為法名之為法是中觀法智慧名之為念通達一切法我我所畢竟不可得故無我破我顛倒即是處也若聲聞經中明四念處但說破四倒為念處若摩訶衍中明念處即說破八倒為念處故大品經云若能深觀四念處是為坐道場四正斷一斷斷謂起惡不善法斷已復生更須精進攝受令不生起斷而又斷是名斷斷二律儀斷謂堅持戒律慎守威儀斷一切惡是名律儀斷三隨護斷謂於無漏真實三昧相中隨順守護不令退沒是名隨護斷四修斷謂已起善法增益修習令其生長諸不善法自然斷除是名修斷四如意足一欲如意足欲者希向慕樂莊嚴彼法故名為欲謂凡所修習一切諸法若無樂欲之心事必不遂若能樂欲所願皆得是為欲如意足莊嚴彼法者謂修希即心令四念處身受心法之觀成就也二念如意足念者專注彼境一心正住故名念謂若非一心觀法斷絶若能一心所願皆得是為念如意足三精進如意足精進者無雜曰精無間曰進謂惟專觀理使無間雜故曰精進凡所修習一切諸法若無精進事必不成若能精進所願皆得是為精進如意足四思惟如意足思惟者思惟彼理心不馳散也謂凡所修習若能思惟所願皆得是為思惟如意足四無量心四無量心者慈悲喜捨也通名無量者謂菩薩利他之心廣大也所緣衆生既無量而能緣之心亦無量也一慈無量心慈名愛念即與樂之心也謂菩薩愛念一切衆生常求樂事隨彼所求而饒益之故名慈無量心二悲無量悲名愍傷即拔苦之心也謂菩薩愍念一切衆生受種種苦常懷悲心拯救濟拔令其得脫故名悲無量心三喜無量心謂菩薩慶他衆生離苦得樂其心悅豫欣慶無量故名喜無量心四捨無量心謂菩薩於所緣衆生無憎愛心名之為捨復念一切衆生同得無憎無愛無瞋無恨無怨無惱故名捨無量心四禪定初禪天即色界離生喜樂地也謂此天已離欲界欲惡之法得覺觀禪定身心凝靜而生喜樂住於此定一切苦惱皆不能逼也二禪天即色界定生喜樂地也謂此天已離初禪覺觀動散攝心在定淡然凝靜而生勝定喜樂住於此定如人從暗室中出見日月光明朗然洞徹也三禪天即色界離喜妙樂地也謂此天已離二禪天喜之踊動因攝心諦觀泯然入定而得勝妙之樂住於此定樂法增長遍滿身中也四禪天即色界捨心清淨地也謂此天捨二禪之喜及三禪之樂心無憎愛一念平等清淨無雜住於此定空明寂靜萬像皆現也四空定一空無邊處定即無色界第一天也謂此天厭色界色質為礙不得自在故加功用行滅一切色相而入虗空處定住於此定其心明淨無礙自在也二識無邊處定即無色界第二天也謂此天厭空無邊處轉心緣識與識相應心定不動三世之識悉現定中住於此定清淨寂靜也三無所有處定即無色界第三天也謂此天厭空無邊處識無邊處三世流轉無際捨此二處而入無所有處定住於此定怡然寂靜諸想不起也四非非想處定即無色界第四天也謂此天厭無所有處如礙故捨之而入非非想處定住於此定不見有無相貌泯然寂絶清淨無為也四向道者謂向苦道難行向苦道速行向樂道難行向樂道速行也何謂向苦道難行如比丘性多貪欲瞋恚愚癡故數受憂苦以聖五根鈍行故證無間定盡諸有漏是名向苦道難行何謂向苦道速行如比丘性多貪欲瞋恚愚癡行道防欲染瞋恚愚癡故愛憂苦以聖五根利行速證無間定盡諸有漏是名向苦道速行何謂向樂道難行如比丘性少欲染瞋恚愚癡欲染瞋恚愚癡少故不數受憂苦以聖五根鈍行證無間定盡諸有漏是名向樂道難行何謂向樂道速行如比丘性少貪欲瞋恚愚癡行道緣欲少故不數受憂苦以聖五根最利行速證無間定盡諸有漏是名向樂道速行四諦者此四通言諦者諦以審實為義此四諦法門正為聲聞人從聞生解故必須藉教詮理今明教理不虗故云審實也若由因感果則應先因而後果今悉先果而後因者教門引物為便故皆先果而後因也一苦諦苦以逼惱為義一切有為心行常為無常患纍之所逼惱故名為苦苦有三種一苦苦二壞苦三行苦今明三苦有別有通別者三苦即別對三受苦受從苦緣生情覺是苦即苦苦也樂受樂壞時生苦即是壞苦也不苦不樂受常為無常遷動即是行苦也若通論三苦則三受通有三苦也所以然者三受之心即是苦通從苦緣生故通是苦苦三受之心通為壞相所壞故通是壞苦也三受之心通是起役運動不停之相故通是行苦也若三受之心若別若通無非是苦當知苦是審實而有故名苦諦也二集諦集以招聚為義若心與結業相應未來定能招聚生死之苦故名為集集有三種業攝一切業一不善業即十不善也二善業即十善也三不動業即十二禪門也煩惱者二種煩惱攝一切煩惱一屬愛煩惱二屬見煩惱是二煩惱出一切三毒五蓋十使九十八煩惱等若此煩惱與前業合則未來定能招聚三界生死苦果即是集諦也三滅諦滅以滅為義結業既盡則無生死之患纍故名為滅若發見思無漏真明具三十四心斷結者則三界九十八使皆滅以煩惱結使滅故三界業亦滅若三界業煩惱滅者即是滅諦有餘涅槃也因滅故果滅捨此報身時後世苦果永不相續名入無餘真滅度也滅理不虗故名為滅諦也四道諦道以能通為義正道及助道是二相扶能通至涅槃故名為道正道者實能觀三十七品三解脫門緣慧行名為正道助道者得解脫觀中種種諸對治法及諸禪定皆是助道復次正道者謂見諦八忍八智十六心思惟九無礙九解脫十八心真無漏慧名為正道其餘方便對治諸禪三昧及三十七品三解脫等皆是助道二道相扶能通至涅槃審實不虗即名道諦也四斷者一戒斷如比丘眼見色不應取想不分別令發眼根常自攝行莫依希望世憂惡不善法慎護眼根戒耳鼻舌身亦爾意意知法不取分別令起意根常自攝行莫依希望世憂惡不善法慎護意根戒是名戒斷二微護斷如比丘取善相生微護若膖脹若青瘀若赤黑若爛壞若離散如是觀善相生微護是名微護斷三修斷如比丘修念正覺依離欲依無染依滅愛擇法精進喜除定正覺修捨正覺依離欲依無染依滅愛是名修斷四智緣斷如比丘或在樹下或露處如是思惟身不善惡行報今世後世堪忍斷身惡行修身善行口意亦爾是名智緣斷偈曰戒護緣修斷自性如來說比丘行是法盡一切苦際是名四斷智五支道者五根謂修行之人修四念處觀雖善萌微發根猶未生根未生故善萌易壞今修五法使善根生故以根為名也一信根謂信於正道及助道法正道者即四念處觀也助道者即五停心之觀也則能出生一切無漏禪定解脫是名信根無漏者因修禪定不落生死也二精進根謂既信四念處正觀及諸助道善法倍䇿精進勤求不息是名精進根三念根謂但念正道及諸助道一心觀想不令邪妄得入是名念根四定根謂攝心正道及諸助道一心寂定相應不散是名定根五慧根謂四念處之慧為定法所攝內性自照不從他知是名慧根五力止觀輔行問云名同於根何須更立答善根雖生惡猶未破更須修習令根增長根成惡破復名為力一信力謂信正道及助道法若信根增長則能遮諸煩惱不為偏小諸疑所動故名信力二精進力謂行此正道及助道法時若精進根增長則能除身心懈怠成辦出世之法是為精進力三念力謂念正道及助道法若念根增長則能破諸邪想成就一切出世正念功德是為念力四定力謂攝心正道及助道法若定根增長則能破諸亂想發諸事理禪定是為定力事理禪定者事即色界無色界禪定也理即聲聞等依理修習所發禪定是也五慧力謂四念處之慧照了一切諸法若慧根增長則能除一切邪妄之執破一切偏小之慧故名慧力何謂五解脫處一若世尊為比丘說法若師說若慧淨行者說若隨順如來說若師若梵淨行者說聽已受法受義受法受義已生悅生喜生悅生喜已受樂受樂已心定心定已如實知見不放逸勤念正智寂靜行心未解脫得解脫諸漏未盡得漏盡是名初解脫也二解脫處者非世尊非師非慧淨行者說時如先所聞法廣讀誦通利通利已心定心定已如實知見不放逸勤念正智寂靜行心未解脫者得解脫諸漏未盡者得漏盡是名第二解脫也三解脫處者非世尊非師非慧淨行者說時非先所聞法廣讀誦通利時廣為他說如比丘隨彼所聞法通利廣為他說如實知見不放逸勤念正智寂靜行心未解脫得解脫諸漏未盡得漏盡是名第三解脫也四解脫處者非世尊非師非梵淨行者說時非先所聞法廣讀誦通利時非先所聞法通利廣為他分別時先所聞法通利自心分別隨所聞法通利自心分別心定心定已如實知見不放逸勤念正智寂靜行心未解脫得解脫諸漏未盡得漏盡是名第四解脫也五解脫處者非世尊非師非慧淨行者說時非先所聞法廣讀誦通利時非先所聞法通利廣為他分別時非先所聞法通利自心分別時善取定相善思惟善解時心定心定已如實知見不放逸勤念正智寂靜行心未解脫得解脫諸漏未盡得漏盡是名第五解脫處也何謂五出界一謂比丘念欲時心不向欲不清不住不解念出欲心出欲心向清住解心善至善調善修心若於欲出解起緣欲生有燋熱出解離不受是痛是名出欲界二念瞋恚時心不向瞋恚不清不住不解念不瞋恚心不恚心向清住解心善至善調善修心若於瞋恚出解起緣瞋恚生有漏燋熱出解離不受是痛是名出瞋恚界三念害謂比丘念害時心不向害不清不住不解念不害不害心向清住解心善至善調善修心若於害出解起緣害生有漏燋熱彼出解離不受是痛是名出害界四謂比丘念色時心不向色不清不住不解念無色無色心向清住解心善至善調善修心若於色出解起緣色生有漏燋熱出解離不受是痛是名出色界五謂比丘念自身時心不向自身不清不住不解念自身滅滅自身心向清住解心善至善調善修心若於自身出解起緣自身生有漏燋熱出解離不受是痛是名出自身界名為五出界何謂五觀定一如世尊說法入定觀世尊有此入定觀或有沙門婆羅門勤精進勇猛正思惟多學行心如法思惟入定入定已觀身從頂至足乃至薄皮皆是不淨是名入初定觀二或有沙門婆羅門勤精進勇猛正思惟多學行心如法思惟入定入定已不觀皮血肉但觀人骨此身中有骨齒爪是名第二入定觀三或有沙門婆羅門勤精進勇猛正思惟多學行心如法思惟入定入定已不觀皮血肉骨但觀人識識住此世住他世識未斷不離二世是名第三入定觀四或有沙門婆羅門勤精進勇猛正思惟多學行心如法思惟入定入定已不觀皮血肉骨復觀人識識不住此世住他世識斷離此世未離他世是名第四入定觀五或有沙門婆羅門勤精進勇猛正思惟多學行心如法思惟入定入定已不觀皮血肉骨復觀人識識不住此世不住他世識善斷離二世是名第五入定觀何謂五起解脫法如比丘觀身不淨想觀食不淨想觀諸行無常想觀世不樂想觀身死想如是五法親近多修學能得解脫是名五解脫法六支道者六念法也一念佛謂念佛具足十號十號者一如來二應供三正遍知四明行足五善逝六世間解無上士七調御丈夫八天人師九佛十世尊也大慈大悲智慧光明神通無量能拔衆苦我以清淨質直之心得親近佛心生歡喜以歡喜故身得快樂以快樂故其心得定以得定故其心平等修念佛觀必趨涅槃是名念佛二念法謂法是如來所有功德即十力四無所畏等十力者知是處非處智力知過去未來業報智力知諸禪解脫三昧智力知諸根勝劣智力知種種解智力知種種界智力知一切至處道智力知天眼無礙智力知宿命無漏智力知永斷習氣智力也四無所畏者一切智無所畏漏盡無所畏說障道無所畏說盡苦道無所畏也我以清淨質直之心得親近法心生歡喜以歡喜故身得快樂得快樂故其心得定以得定故其心平等修念法觀必趨涅槃是名念法三念僧謂僧是如來弟子得無漏法具戒定慧無漏法者謂修戒定慧之法則不漏落生死也能為世間衆生作良福田應當恭敬我以清淨質直之心得親近僧心生歡喜以歡喜故身得快樂得快樂故其心得定以得定故其心平等修念僧觀必趨涅槃是名念僧四念戒謂念諸禁戒能遮諸惡煩惱我以清淨質直之心得親近戒心生歡喜以歡喜故身得快樂以快樂故其心得定以得定故其心平等修念戒想必趨涅槃是名念戒五念施謂念己所施獲得善利一切世間為慳嫉所覆我於今者得離如是慳貪之垢住捨心中於一切物心無吝惜持用布施既布施已我心應喜以喜心故身得快樂以快樂故其心得定以得定故其心平等修念施想必趨涅槃是名念施六念天謂念欲界天等悉因往昔戒施善根得生彼處受天快樂我亦見有如是戒施功德捨命之時必生彼天以念天故離於惡法心生歡喜心歡喜故身得快樂得快樂故其心得定以得定故其心平等修念天想必趨天道是名念天六出界者第一如比丘向彼比丘如是說我慈解心親近多修學作乘作物謹慎識善進我為瞋恚所覆彼慎比丘責此比丘比丘莫如是說莫謗世尊謗世尊不善世尊不如是說比丘此非希望處若慈解心親近多修學已作乘作物已謹慎已識已善進已若瞋恚覆心者無有是處世尊說比丘出瞋恚心善慈解心若多修學無量第二如比丘向彼比丘如是說比丘我悲解心親近多修學作乘作物謹慎識善進我故為害心所覆彼慎比丘責此比丘比丘莫如是說莫謗世尊謗世尊不善世尊不如是說比丘此非希望處若悲解心親近多修學已作乘作物已謹慎已識已善進已若為害所覆心者無有是處世尊說比丘出為害心善悲解心若多修學無量第三如比丘向彼比丘如是說我喜解心親近多修學作乘作物謹慎識善進我故為不樂心所覆彼慎比丘責此比丘比丘莫作是說莫謗世尊謗世尊不善世尊不如是說比丘此非希望處若喜解心親近多修學已作乘作物已謹慎已識已善進已若不樂所覆心者無有是處世尊說比丘出不樂心善喜解心若多修學無量第四我捨解心我故為愛恚所覆亦如是第五如比丘向彼比丘如是說我無想定心親近多修學作乘作物謹慎識善進我故有念想識彼慎比丘責此比丘比丘莫如是說莫謗世尊謗世尊不善世尊不如是說比丘此非希望處若無想定心親近多修學已作乘作物已謹慎已識已善進已若有念想識者無有是處世尊說比丘出一切想若無想定心若多修學無量第六如比丘向彼比丘如是說我滅我及我所故有疑惑箭覆心彼比丘責此比丘比丘莫作如是說莫謗世尊謗世尊不善世尊不如是說比丘此非希望處若滅我及我所故有疑惑箭覆心者無有是處世尊說比丘出疑惑箭若斷我慢若多修學無量是名六出界云何六明分法一無常明分法或在樹下或露處作是思惟色無常受想行識無常如是五受陰觀無常行如世尊說有為法三相生住滅如是思惟生住滅調心修令柔軟柔軟已思惟色受想行識無常想親近多修學已生明得明得明分能令明廣大是名無常想明分法二無常苦想明分法或在樹下或露處如是思惟色無常若無常則是苦受想行識亦如是若是五受陰觀苦行如世尊說若色生住即是生苦有病有老死若受想行識生住即是生苦有病有老死及種種諸苦如是行人若想憶想是為無常想親近多修學已生明得明得明分能令明廣大是名無常苦明分法三苦無我明分法或樹下露處如是思惟色無常即是苦苦苦即無我受想行識無常亦如是若於此想五受陰觀無我行如說色無我色若是我色不應受苦患色應得自在如是有如是非有受想行識亦如是如是調心修令柔軟柔軟已思惟色受想行識無我如是行人若想憶想是名苦無我想親近多修學已生明得明得明分能令明廣大是名苦無我明分法四食不淨想明分法食有四種謂摶食觸食思食識食受摶食時如食子肉觀不淨想觸思識食有解體想思惟依離欲染如是行人若想憶想是名食不淨想親近多修學已生明得明得明分能令明廣大是名食不淨想明分法五一切世間不樂想明分法謂於一切世間厭離不樂地獄世畜生世餓鬼世人世天世衆生世厭離不樂斷離不受如世行人若想憶想是名一切世間不樂想親近多修學已生明得明得明分能令明廣大是名一切世間不樂想明分法六死想明分法或樹下露處如是思惟我是死法有死過患若餘衆生亦有死法有死過患若地獄畜生餓鬼天人及一切衆生往來生死得名衆生者皆有死法有死過患如是思惟陰捨身憶念死思惟死知死解死覺死如是行人若想憶想是名死想親近多修學已生明得明得明分能令明廣大是謂死想明分法何謂六悅因法如比丘悅已生喜喜已得身得身已除身除身已受樂受樂已心定心定已如實知見是名六悅因法何謂六無喜正覺念正覺乃至捨正覺是名六無喜正覺七支道者七覺分也覺即覺了謂覺了所修之法是真是僞也分即支分謂此七種法各有支派分齊不相雜亂故名七覺分亦名七覺支擇進喜三覺分屬慧除捨定三覺分屬定念覺分兼屬定慧故摩訶止觀云修此七覺即得入道是也一擇法覺分擇即揀擇謂用智慧觀察諸法之時善能簡別真僞而不謬取虗僞之法故名擇法覺分二精進覺分不雜名精無間名進謂修諸道法之時善能覺了不行無益苦行而於真正法中常能用心專一無有間歇故名精進覺分三喜覺分喜即歡喜謂心契悟真法得歡喜時善能覺了此喜不從顛倒法生住真法喜故名喜覺分四除覺分除即斷除謂斷除諸見煩惱之時善能覺了除去虗僞之法增長真正善根故名除覺分五捨覺分捨即捨離謂捨離所見念著之境善能覺了虗僞不實永不追憶故名捨覺分六定覺分定即禪定謂發禪定之時善能覺了諸禪不生煩惱妄想是名定覺分七念覺分念即思念謂修諸道法之時善能覺了常使定慧均平若心昏沉之時當念用擇法精進喜三覺分觀察諸法令不昏沉若心浮動之時當念用除覺分除身口之過非用捨覺分捨於觀智用定覺分入正禪定攝其散心令不浮動是名念覺分何謂七想一不淨想親近多修學多修學已得大果報得大功德得至甘露以何因緣故作是說心知分別不淨想令欲心退沒不展當漸漸除盡背捨厭離已正住如筋如鳥羽如頭羅草投於火中燋捲不展後便消盡背捨離厭已正住是名不淨想二如食不淨想親近多修學多修學已得大果報得大功德得至甘露心知分別食不淨想於摶食心退沒不進漸當除盡背捨厭離已正住是名食不淨想三一切世間不樂想親近多修學多修學已得大果報得大功德得至甘露以何因緣故作是說心知分別一切世間不樂想世間種種想心退沒不進漸當除盡背捨厭離已正住如筋如鳥羽如頭羅草投於火中燋捲不展後便消盡如是心知分別一切世間不樂想令世間種種想心退沒不進漸當除盡背捨厭離已正住是名一切世間不樂想四死想親近多修學多修學已得大果報得大功德得至甘露以何因緣作是說心知分別死想倚恃命根而自貢高以命根定堪忍常住心貪著命根如是盡斷無餘是名死想五無常想親近多修學多修學已得大果報得大功德得至甘露以何因緣故作是說心知分別無常想於利養名譽恭敬心退沒不進漸當除盡背捨厭離已正住如筋如鳥羽如頭羅草投於火中燋捲不展後便消盡如是心知分別無常想於利養名譽恭敬心退沒不進漸當除盡背捨厭離已正住是名無常想六無常苦想親近多修學多修學已得大果報得大功德得至甘露以何因緣作是說如是心知分別無常苦想於懈怠窳墯不信放逸不勤不觀等生恐怖大畏切逼想如臨死舉力觀無常想是名無常苦想七苦無我想親近多修學多修學已得大果報得大功德得大甘露以何因緣故作是說如是心分別苦無我想於諸有識身及諸外物計我我所生憍慢等俱離寂靜正解脫是名苦無我想何謂七定因緣法正見正覺正語正業正命正精進正念是為七定因緣法八支道者八正道也謂此八法不依偏邪而行故名為正復能通至涅槃故名為道一正見謂人修無漏道無漏道者即戒定慧修此道者能斷三界有漏生死也見四諦分明破外道有無等種種邪見是為正見二正思惟謂人見四諦時正念思惟觀察籌量令觀增長是為正思惟三正語謂人以無漏智慧常攝口業遠離一切虗妄不實之語是為正語四正業謂人以無漏智慧修攝其心住於清淨正業清淨正業者謂戒定慧等出世之善業也斷除一切邪妄之行是為正業五正命謂出家之人當離五種邪命利養常以乞食自活其命是為正命六正精進不雜名精無間名進謂人勤修戒定慧之道一心專精無有間歇是名正精進七正念謂人思念戒定慧正道及五停心助道之法堪能進至涅槃是名正念八正定謂人攝諸散亂身心寂靜正住真空之理決定不移是名正定八背捨背謂違背捨即棄捨大智度論云背此淨潔五欲捨此著心故名背捨修此觀故發無漏智慧斷三界見思惑盡證羅漢果即轉名八解脫也淨潔五欲者若欲界色聲香味觸即名粗弊五欲名為不淨若色界無色界色聲香味觸即名淨潔五欲也無漏智慧者謂二乘等由此智慧斷除惑業不漏落生死也三界者欲界色界無色界也見思惑者謂意根對法塵起諸分別曰見惑眼等五根對色等五塵起諸貪愛曰思惑梵語阿羅漢華言無學一內有色相外觀色謂行人先觀自己色身相狀壞爛不淨不可愛樂一心靜定更想皮肉脫落但見白骨有八色光明八色光明者謂見地色如黃白淨地見水色如淵中澄清之水見火色如烟薪清淨之火見風色如無塵清風見青色如金精山見黃色如薝蔔花見赤色如春朝霞見白色如珂雪也故云內有色相又為欲界貪欲難斷雖已自觀內色不淨故須復以不淨觀於他人之色令生厭惡以求斷除故又云外觀色此即初背捨位在初禪天定二內無色相外觀色謂行人為入二禪已滅內身色相故云內無色相又為欲界貪欲難斷故猶觀外不淨之相令生厭惡以求斷除故又云外觀色此即第二背捨位在二禪天定三淨背捨身作證淨即緣於淨相也謂行人於第二背捨後除棄外色不淨之相但於定中練習八色光明清淨皎潔猶如妙寶之色故云淨背捨心既明淨樂漸增長遍滿身中悉皆怡悅故又云身作證此即第三背捨位在三禪天定四虗空處背捨謂行人於欲界後已除棄自身不淨之色初背捨後又除棄內身白骨之色第二背捨後又除棄外身一切不淨之色尚餘八種淨色皆依心住若心捨色色即謝滅一心緣空與空相應即入無邊虗空處定故云虗空處背捨此即第四背捨位在四禪天定五識處背捨謂行人若捨虗空處一心緣識入定時即觀此定依五陰等悉皆無常苦空無我無常者謂五陰之身終歸壞滅也苦者謂身有生死逼迫等苦也空者謂身由四大假合而成本來空也無我者謂四大各離誰是我耶虗誑不實心生厭背而不受著故云識處背捨六無所有處背捨謂行人若捨識處一心緣無所有處入定時即觀此定依五陰等悉皆無常苦空無我虗誑不實心生厭背而不受著故名無所有處背捨七非有想非無想處背捨謂行人若捨無所有處一心緣非有想非無想入定時即觀此定依五陰等悉皆無常苦空無我虗誑不實心生厭背而不愛著故名非有想非無想背捨八滅受想背捨受即領納想即思想即五陰中受想二心也謂行人厭患此心散亂欲入定休息故背滅受想諸心是名滅受想背捨八勝處八勝處者謂修八背捨後觀心純熟轉變自在若淨若不淨隨意能破也禪波羅蜜云初二勝處位在初禪第三第四勝處位在二禪第五至第八勝處位在四禪三禪不立勝處者以三禪天樂多心純故不立也一內有色相外觀色小若好若醜是名勝知勝見謂行人先觀自己色身相狀壞爛不淨不可愛樂一心靜定更想皮肉脫落但見有八色光明故云內有色相又以觀道未增若觀多色恐難攝持故觀少色是以自觀己身不淨亦觀所愛之人身亦不淨故云外觀色少若好若醜者謂觀外諸色善業果報故名好惡業果報故名醜或時繫心一處觀欲界中色能生貪欲者是淨色名為好能生瞋恚者是不淨色名為醜勝知勝見者謂觀心純熟於好色中心不貪愛於醜色中心不瞋恚也二內有色相外觀色多若好若醜是名勝知勝見謂行人先觀自己色身相狀壞爛不淨不可愛樂一心靜定更想皮肉脫落但見白骨有八色光明故云內有色相觀於內身色相既熟則觀外色雖多亦無妨礙所謂諦觀一死尸至十百千萬等死尸若觀一肨脹時悉見一切肨脹乃至壞爛青瘀剝落亦復如是故云外觀色多好醜知見如初勝處中釋三內無色相外觀色少若好若醜是名勝知勝見謂行人入二禪已滅內心色相故云內無色相又以觀道未增若觀多色恐難攝持故觀少色是以自觀己身不淨亦觀所愛之人身亦不淨故云外觀色少餘如前釋四內無色相外觀色多若好若醜是名勝知勝見謂行人入二禪已滅內身色相故云內無色相觀內身色相既無則外觀色相雖多亦無妨礙所謂諦觀一死尸至千萬死尸若觀一肨脹時悉見一切肨脹乃至壞爛剝落亦復如是好醜勝知勝見如前蓋行人為欲界煩惱難破故於第二禪中重修第三第四勝處除滅欲界煩惱令無遺餘亦令觀道增進牢固不失工力轉勝也五青勝處謂行人觀青色照耀勝於背捨八色光明中所見青相不起法愛故名勝處六黃勝處謂行人觀黃色照耀勝於背捨八色光明中所見黃相亦不起法愛故名勝處七赤勝處謂行人觀赤色照耀勝於背捨八色光明中所見赤相亦不起法愛故名勝處八白勝處謂行人觀白色照耀勝於背捨八色光明中所見白相亦不起法愛故名勝處九支道者即九次第定也九者自初禪至滅受想定凡九種也次第者謂人若入禪時智慧深利能從一禪又入一禪如是次第而入心心相續不生異念無間無雜定者攝心不亂也初禪次第定謂人修禪定離欲界惡不善法有覺有觀離生喜樂定觀均齊有覺有觀者初心在緣曰覺細心分別禪味曰觀即是初禪之定相離生喜樂者慶悅之心名為喜恬淡之心名為樂初禪既離欲界惡不善法故生此喜樂也定觀均齊者觀即是慧所謂定慧平等也其心次第而入無有雜念間隔也二禪次第定謂人修禪定從初禪入二禪時一心無覺無觀定生喜樂無覺無觀者既入二禪即離初禪覺觀動散也定生喜樂者既無覺觀攝心在定則生喜樂此即二禪之定相也其心次第而入無有雜念間隔也三禪次第定謂人修禪定從二禪入三禪時離喜行捨而受身樂唯聖人能說而復捨念行樂離喜行捨者謂厭離二禪大喜動散攝心不受也受身樂者既離二禪之喜而身受三禪之樂也聖人能說者此樂極勝超過一切之樂非凡夫所知也捨念行樂者謂能捨二禪之喜念而行三禪之樂也其心次第而入無有雜念間隔也四禪次第定謂人修禪定從三禪入四禪時斷喜樂故不喜不樂斷喜樂者謂斷二禪之喜及三禪之樂也不喜不樂者謂心無善惡寂然平等即是四禪之定相也其心次第而入無有雜念間隔也五虗空處次第定謂人修禪定從色界入無色界則滅一切色相不念種種異相滅一切色相者謂滅根境可見可對一切色相也既得四禪定已猶厭色界色質為礙不得自在於是心求出離滅一切色相而修虗空處定心與虗空之法相應則不念種種異相也入無邊虗空處其心次第而入無有雜念間隔也六識處次第定謂人修禪定既得虗空處定已心緣虗空虗空無邊緣多則散能破於定即捨虗空轉心緣識心與識法相應則過一切無邊虗空處過一切無邊虗空處者既入識處則超過虗空處也入一切無邊識處其心次第而入無有雜念間隔也七無所有處次第定無所有處者即不緣一切內外境界也內外境者內即識處外即虗空處也謂人修禪定既得識處定已三世心識三世者過去現在未來也無量無邊緣多則散能破於定即捨所緣之識轉心緣無所有處其心次第而入無有雜念間隔也八非想非非想次第定非想者非識處之有想也非非想者非無所有處之無想也謂人修禪定既得無所有處定已深知無想處如癡有想處如癰如瘡如癡者譬無心想也如癰如瘡者有痛即覺譬有心想也即捨無所有處緣念非有想非無想之法其心次第而入無有雜念間隔也九滅受想次第定滅受想者即受想心滅而不復起也謂人修禪定從非有想非無想入滅受想定時其心明利次第而入無有雜念間隔是為滅受想次第定若得此定不久即證阿羅漢果也九想觀如前殺戒中明十支道者即十想也前三想為斷見諦惑說中四想為斷思惟惑說後三想為修無漏道者說是以壞法之人修此十想能斷三界結使證無漏之聖果也一無常想觀一切有為法無常智慧相應想名無常想一切有為法有二種一者衆生二者國土是二皆新新生滅故無常也二苦想觀一切有為法苦智慧相應想名苦想若有為法無常者即是苦常為三苦八苦之所遷逼故名苦也三無我想觀一切法等無我智慧相應想名無我想若有為法悉是苦者即無我以無自在故亦以苦從緣生無有自性無自性中我不可得四食不淨想觀諸飲食皆從不淨因緣故有如肉從精血水道中生酥酪等亦皆隨事觀之悉是不淨也五世間不可樂想觀一切世間不可樂智慧相應想名為世間不可樂想有二種世間一者衆生二者國土有過惡不可樂也六死想觀死智慧相應想名為死想若一期果報常為二種死之所逐者則出息不保入息也七不淨想觀自他身不淨智慧相應想名為不淨想若觀此身內有三十六物外則九孔惡露常流從生至終無一淨也八斷想觀涅槃離生死智慧相應想名為斷想行者思惟若涅槃清淨無煩惱者當斷結使證涅槃也九離想觀涅槃離生死智慧相應想名為離想行者思惟若涅槃清淨離生死者當離生死證涅槃也十盡想觀涅槃結使及生死盡智慧相應想名為盡想行者思惟若涅槃清淨結使及生死永盡結使及生死業盡即證涅槃也十直者謂正見正覺正語正業正命正進正念正定正解脫正智是名十直十一切入亦名十遍處定智度論云八背捨為初門八勝處為中行遍一切處為成就謂二種觀具足禪體始得成就此定謂遍一切處者從所觀境遍滿得名也青黃赤白地水火風空識遍一切處定前四謂於定中還取八背捨八勝處中所見青色使遍一切處皆青餘三定亦爾後六謂於中還取八背捨八勝處中所見地色使一切處無不周遍餘五定亦爾十一切者以一想上下縱廣無二無量何謂地謂地界地大是名為地何謂一切若盡無餘方便是名一切何謂一若獨非餘界如人入地一切入是為一何謂觀心不分散不相離一向地想何謂上下縱廣上謂虗空下謂地縱廣謂四方如人若上下縱廣皆思惟地知解受地是名上下縱廣何謂無二無量上無二下無二縱廣無二上無量下無量縱廣無量無二唯有地想無量無邊阿僧祇無邊無際於無異想是名無二無量餘准知十一支道者十一解脫入也第一如比丘離欲惡不善法有覺有觀離生喜樂成就初禪行如是思惟此定正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸有漏以法欲法樂故斷五下分煩惱於彼化生而般涅槃不還此世是名第一解脫第二如比丘滅覺觀內正信一心無覺無觀定生喜樂成就二禪行如是思惟此定正覺正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷下五分煩惱於彼化生而般涅槃不還此世是名第二解脫第三如行人離喜捨行念智正智身受樂如諸聖人解捨念樂行成就三禪行如是思惟此定正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分煩惱於彼化生而般涅槃不還此世是名第三解脫第四如行人斷苦樂先滅憂喜不苦不樂捨念清淨成就第四禪行如是思惟此定正覺正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是為第四解脫第五如行人慈解心遍四維上下一切慈解心廣大尊勝無二無量無怨無恚如是思惟此慈解心正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是為第五解脫第六謂行人悲解心遍四維上下一切悲解心廣大尊勝無二無量無怨無恚如是思惟此悲解心正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是名第六解脫第七喜心第八捨心並同前不異第九謂行人離一切色想滅瞋恚想不思惟若干想何謂若干想若諸衆生諸物諸境界諸清淨諸煩惱是名若干想成就無邊空處如是思惟入此定正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是名第九解脫第十謂行人離一切空處成就無邊識處行如是思惟入此定正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是為第十解脫第十一謂行人離一切識處成就無所有處行如是思惟入此定正學正生若一切正學正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是名第十一解脫第十二謂行人離一切無所有處成就非非想處行如是思惟入此定正學正生若一切正覺正生已盡知是無常滅法如實知見斷一切諸漏心得解脫雖未斷諸漏以法欲法樂故斷五下分結於彼化生而般涅槃不還此世是為第十二解脫也如人求一寶藏得十一寶藏如是求一解脫入得十一解脫入如長者舍有十一門為火所燒猛𦦨熾盛長者長者子意欲出時於諸門中自在得出行者亦如是於十一法門中所欲出處隨意得出應求一解脫得十一解脫故名十一解脫也於十一支道中隨修一法便得道果非謂全修諸法而得解脫故云從一支道乃至十一支道也殞音允歿也大妄語戒楞嚴經云如是世界六道衆生乃至三摩提不得清淨等三摩提亦曰三摩底此云等持即方便隨緣止止於俗諦三摩提智論云一切禪定攝心皆名三摩提秦言正心行處是心從無始來常曲不端得是正心行處則端直譬如蛇行常曲入竹筒中則直亦翻等持者謂離沉掉曰等心住一境性曰持大妄語者自謂已得上人法貪其世間尊勝名利也內貪名利欲他重己則成愛魔內起邪見以己均聖則成見魔未得謂得得謂得道指理言也證謂證果指位言也須陀洹果等阿羅漢道辟支佛乘蓋小乘理至阿羅漢而極故言道也虗妄稱尊求彼禮懺希供養故也人於果人前懺悔必盛陳供養故是一顛迦此翻極惡又名畢竟以畢竟無涅槃性即無信闡提斷滅善根如貝多羅樹以刀斷則不復活喻大妄語永絶善根沉三苦海即三塗也第四卷五蓋心蓋即蓋覆之義謂諸衆生由此貪等五惑蓋覆心識而於正道不能明了沉滯三界不能出離也一貪欲蓋貪欲者引取無厭曰貪希須樂慕為欲謂諸衆生貪愛世間男女色聲香味觸法及財寶等物無有厭足以此貪欲蓋覆心識禪定善法不能發生沉滯三界不得出離故名蓋也二瞋恚蓋瞋恚者即忿怒之心也謂諸衆生或於違情境上或追憶他人惱我及惱我親而生忿怒以此瞋恚蓋覆心識禪定善法不能發生沉滯三界不得出離故名蓋也三睡眠蓋睡眠者意識惛熟曰睡五情暗冥曰眠五情者即眼耳鼻舌身五根也謂諸衆生以此睡眠蓋覆心識禪定善法不能發生沉滯三界無有出期故名蓋也四掉悔蓋掉悔者掉動也身無故遊行為掉掉已思惟心中憂惱為悔謂諸衆生以此掉悔蓋覆心識禪定善法不能發生沉滯三界無有出期故名蓋也五疑蓋疑者猶豫不決之義即疑惑也謂諸衆生無明暗鈍不別真僞猶豫之心常不決斷以此疑惑蓋覆心識禪定善法不能發生沉滯三界無有出期故名蓋也舍衛國中妙五欲止觀云五塵非欲而其中有味能起行人須欲之心故言五欲常能牽人入諸魔境故也一色欲謂男女形貌端莊及世間寶物玄黃朱紫種種妙色能令衆生樂著無厭故名色欲二聲欲謂絲竹環珮之聲及男女歌詠等聲能令衆生樂著無厭故名聲欲三香欲謂男女身香及世間一切諸香能令衆生樂著無厭故名香欲四味欲謂種種飲食肴膳等美味能令衆生樂著無厭故名味欲五觸欲謂男女身分柔軟細滑寒時體溫熱時體涼及衣服等種種好觸能令衆生樂著無厭是名觸欲鑰音藥鎖鑰開鎖之具捫摸上音門撫持也即捉持也下音莫摸𢱢也即摸𢱢女人也溺音匿沉沒捻音聶指捻髀音彼股骨也秸與秸同音戞禾稿去其皮故名草秸縊音醫絞也自經死也嚙同咬音咬齧也指印按根本雜事佛聽比丘畜印以為記驗但不聽著指環及寶莊飾許用鍮石赤銅白銅牙角五種物作又印有二種一是大衆二是私物若大衆印可刻轉法輪像兩邊安鹿伏跪而住其下應書元本造寺施主名字若私印刻作骨鎖像或作髑髏形欲令見時生厭離故凡律中言手印指印皆如此株音諸木根入土曰根土上曰株睒音閃沃壤上音屋泉之從上溜下者為沃泉下音攘柔土無塊曰壤壤赤土以萬物自生即不假溉灌萬物自生故稱沃壤土也崇樹崇者尊也樹者扶樹植也所謂尊敬植種福善誣音無謗也以無為有也第五卷羝音低牡羊三歲曰羝性善抵觸柔順忍謂文殊與彼說法懺悔心得柔軟順忍者謂於理於事悉能隨順諦審忍可而無違逆也賓吒羅地獄此云集欲適入尋出雖復在中而無苦痛得無生忍無生忍者謂了達諸法本來無生亦無有滅諦審忍可而妄念不起也十二分教亦名十二分經一修多羅華言契經契者上契諸佛之理下契衆生之機經貫穿所說義理令無散失攝持所化物機使無顛墜即經中長行也故云契經二祇夜華言應頌又云重頌謂長行之文重宣其義三伽陀華言諷頌謂不頌長行直說偈句四尼陀羅華言因緣如經中有人問故為說是事如律中有人犯是事故制是戒如來所說一切根本緣起之事皆名因緣如法華經中化城喻品說宿世因緣等是也五伊帝目多華言本事謂說諸菩薩弟子因地所行之事如法華經中本事品云藥王菩薩於日月淨明德佛所得法歡喜即然身臂以為供養修諸苦行求菩提道等是也六闍多伽華言本生謂說佛菩薩本地受生之事伽涅槃經云比丘當知我於過去作鹿羆麞兔龍及作金翅鳥粟散王轉輪聖王之類是也七阿浮達磨華言未曾有亦云希有謂如佛初生時即行七步足迹之處皆有蓮花放大光明遍照十方世界而發是言我是度一切衆生生老病死者地大震動天雨衆花樹出音聲作天妓樂如是等無量希有之事是也八婆陀具云阿波陀那華言譬喻謂如來說法為鈍根者假譬喻以曉示之令其開解如法華經中火宅藥草等喻是也九優婆提舍華言論議謂諸經中問答辨論諸法之事如法華經提婆達多品中智積菩薩與文殊師判論說妙法等是也梵語提婆達多華言天熱梵語文殊師利華言妙德十優陀那華言自說謂無有人問如來以他心智觀衆生機而自宣說如楞嚴會上說五十種魔事不待阿難請問五十種魔者謂色受想行識五陰各有十種也梵語阿難華言慶喜梵語舍利弗華言鶖子又如彌陀經無有緣起自告舍利弗等是也十一毗佛略華言方廣方者法也廣者大也謂大乘方等經典其義廣大猶如虗空也十二和伽羅華言授記謂如來為諸菩薩辟支聲聞授作佛記等辟支梵語具云辟支迦羅華言緣覺䩭同羇音雞俳音牌俳優雜戲笙音生樂器竿音干匏蒲交切音庖瓠也長而瘦上曰瓠短頸大腹曰瓠蹙宗入聲口縮小而吹聲也癢音詳熊音雄獸似豕山居冬蟄好舉木引氣謂之熊羆音皮似熊而長頭似馬有髦高腳猛憨力能拔木跳躑上音糶躍也並足起下音擲住足也跳躑也贈遺上昨亘切層去聲送遺也下音位餽也贈也號咷上音毫下音陶大哭也贓音臧吏受賄也凡非理所得財賄皆曰贓賄灰上聲財也金玉曰貨布帛曰賄四攝法此四通言攝者攝即攝受也謂菩薩欲化導衆生必須以此四法攝受使其依附然後導以大乘正道故維摩經云先以欲鈎牽後令入佛智是也一布施攝謂菩薩以財法二種布施攝衆生也若衆生樂財即以財施攝之若衆生樂法即以法施攝之衆生既蒙二施利益因是生親愛心依附受道得住真理故名布施攝二愛語攝謂菩薩隨順衆生根性善言慰喻則一切衆生樂聞善言因是生親愛心依附受道得住真理故名愛語攝三利行攝謂菩薩起身口意善行利益一切衆生因是生親愛心依附受道得住真理故名利行攝四同事攝謂菩薩以法眼明見衆生根性隨其所樂即分形示現同其所作使其各霑利益因是生親愛心依附受道得住真理故名同事攝氐都黎切音低二十八宿中第三宿之名也第六卷五種邪命謂以此五種邪法用求利養而自活命為比丘者當深戒之一詐現異相謂諸比丘違佛正教於世俗人前詐現奇特之相令其心生敬仰而求利養是為邪命二自說功能謂諸比丘以辨口利詞抑人揚己自逞功能令所見者心生信敬而求利養是為邪命三占相吉凶謂諸比丘攻學異術卜命相形講談吉凶而求利養是為邪命四高聲現威謂諸比丘大語高聲詐現威儀令人畏敬而求利養是為邪命五說所得利以動人心謂諸比丘於彼得利於此稱說於此得利於彼稱說令人動心而求利養是為邪命乾痟病乾痟乃渴病也又云乾枯病以其肌膚痟瘦也僧祇云消盡病也有蟲名嚙脂住在身中脂脉之內若食有過若多睡眠此蟲則瞋不消飲食此為衆病之根源故乾痟病由之而成儲音除貯也積聚也貿音茂交易財也驕音嬌逸也恣也傲也自矜也冶音野裝餝也又妖冶女態也第七卷平章上音屏正也下音張明也即我為施主正明此事銼蹉去聲細細斫斬和泥御音遇統也統御四海之義東漸者潛上聲潛者來也謂佛法東來也閭里上音廬五家為比五比為閭二十五家也里者鄰里也五家為鄰五鄰為里即閭里無不聞其慈行也徑音敬小路也論語行不由徑又直也稔忍枕切音飪穀熟曰稔古人謂一年為一稔取穀一熟也繒音情帛也纊音曠絮之細者呫音帖鍮音偷鍮石銅似金也鉛音延青金也鍚之類生蜀有銀坑處有之錫音昔青金一名鑞一名鈏鍚生桂陽羺䍲上耨平聲下音倪胡羊之名也揲甜入聲摺揲也鑷音捻牻莫江切音厖白黑雜毛也毳吹去聲獸毛縟細者鐐音聊白金之美者第八卷糴音狄買穀也糶挑去聲賣米穀悕音希念也雹音薄雨氷也疫音域癘鬼為災瘟疫也說文民皆疾也企音器舉踵而望也綴音拙聯也又音贅義同滲森去聲漏也閾音域門限也門下橫木為內外之限也繀音粹織繀箸絲於筟車辮婢免切便上聲交也繆也橛音掘即木樁也苣蕂上渠上聲下音聖即胡麻也乃胡國之種非芝也其色如醬其形如虱服之能僻穀延年木蜜北方地燥多在土中故多土蜜南方地濕多在木中故多木蜜髠音坤𩮜髮也矜音京矜持自餝也餝音尺致堅也謂攀持致堅昴音卯二十八宿中第十八宿之名也第九卷勗音旭勉也詭音癸異也詐也竄音㸑務音霧事務又專力於事也瞎香入聲目盲也搪揬上音唐下音突搪揬觸也又搪揬不遜鍛端去聲鍛磨也椎鍊也又曰冶金簸波去聲揚米去糠之竹器也躄音碧躄者兩足俱廢跛波上聲跛者行不正足偏廢也稗音敗草似稻而實細從從去聲才仲切母之姊妹曰從母叔伯兄弟曰從弟眩音衒潰亂也漬音恣被雨浸也霑音詹雨淋也漬也钁斫上匡入聲大鉏也下音捉斫削鎌音廉鍥也鍥音結刈鉤也鎌也掐苦洽切嵌入聲爪刺拴古文橛字木入土也礦古猛切音礦雌黃陽山出曰雄黃陰山出曰雌黃赭音者赤土也墡音善白土也林薄旁入聲木曰林草曰薄拗於巧切凹上聲手拉折也拉音蠟折也摧也縹飄上聲青白色剗音産削平也笮音謫壓也醫羅鉢羅醫羅樹名此云臭氣鉢羅此云極由往昔損此樹葉故頭上生此臭極之樹也婆羅痆斯國舊云波羅奈河名也去河不遠造立王城或翻江繞城痆乃八切音捺駛音使馬疾行也第十卷讟音讀怨謗也荻音敵蘆屬苕音迢苕陵苕黃華蔈白華蔈音表拍音珀拊也打也扞與捍同抵也紵直呂切除上聲宿根在地入春自生一歲三收剝皮緝以織布帔音轡裙屬衣帔帚周上聲帚彗也彗音遂掃竹也寱音義睡語也懲音呈止也戒也羂涓上聲罟也水八德一澄淨二清冷三甘美四輕軟五潤澤六安和七飲時除飢渴等一切過患八飲已即能長養諸根四大淨覺云清是色入不臭是香入輕冷是觸入美是味入調適是法入也迮音謫迫也堰音燕壅水也𦮽音谷禾皮曰𦮽䒢音昴蒲草也芒音茫稻麥芒也苫閃平聲蓋也編茅也又草覆屋也般陀周陀或云周利此云大路邊生佛本行經云其母是長者之女隨夫他國久而有妊垂産思歸行至中路即誕其子如是二度生二子乃以大小而區別之大者即周陀小者即莎伽陀其兄後來出家不久得阿羅漢果其弟後厭俗從兄出家兄教一偈四月不得忘前失後兄念於佛法無緣即牽令出門還家門外啼哭不欲還家佛以天眼觀見應可度往至其前問知安慰其心即以少許白氎與般陀捉此向日而𭨃當作是言取垢取垢世尊教已入聚受請時臨日中觀般陀將得道果即說偈言入寂者歡喜見法得安樂世無瞋恚樂不害於衆生世間無欲樂出離於愛欲若調伏我慢是為第一樂般陀遙聞此偈即得阿羅漢果塹與塹同籤去聲坑塹也襞音碧襞摺疊衣也尉音畏火斗又持火所以尉繒也舁音于對舉也又音預義同篙音高刺船竿也棹與櫂同巢去聲進船楫也在傍撥水短曰楫長曰櫂磧音迹水渚有石者斟音針斟酌也黎師達此云仙授又云仙與又云仙施謂從仙人乞得也稱揚即舉其道德也擬音蟻議也揣度以待也火光三昧即第四禪定也第十一卷餮音鐵貪財曰賄貪食曰餮維那梵語羯磨陀那此翻知事又翻悅衆維那二字華梵雙舉維是綱維華言也那是梵語略去羯磨陀三字膳然上聲美食也嗜音示欲也好也罽音記撮竄入聲六十四黍為圭四圭為撮罅蝦去聲裂也癰音雍癰疽痤坐平聲小腫也一曰癤也爛闌去聲熟也黃爛病即黃熱病也痔池上聲後病也瘧音虐痁病也周禮疾醫秋時有瘧寒疾疏云秋時陽氣漸消陰氣方盛惟火沴金兼寒兼熱故有瘧寒之疾黏魚占切音嚴相著也瀨音賴第十二卷槊音朔矛屬驍音囂武猛也又健也距渠上聲凡刀鋒倒刺皆曰距又鉤距吞之則順吐之則逆馭音遇使馬也駟音四駟者一乘四馬兩服兩驂是也轂音谷車轂輻所凑也禦音御拒也抵也捍音翰衛也抵也敢勇充選敢音簡進取也忍為也勇容上聲健也猛也知死不避也充音冲長也高也謂步兵進取忍為知死不避高長可選也櫓古文櫓字音魯大盾也戎冗平聲五戎弓殳矛戈戟鋭音兌矛也音胃利也矛音謀兵器如鋋而三廉也盾閏上聲干櫓之屬矢音始箭也戈果平聲鉤子戟也如戟而橫安刃頭嚮下為鉤殳音殊兵器積竹為之長一丈二餘而無刃矟音朔矛屬矛丈八者謂之矟馬上所持言其矟矟便殺也鶉音純䳺鶉兩種有丹有白䳺音菴懾怖懾與懾同簷入聲心伏也怯也下音布惶懼也甄音真陶也察也又音堅義同傾卿上聲俄傾少選時也粳音耕稻之不黏也苽音姑雕苽即雕胡今茭苗米是也甜音田味甘也酢音措酸漿也啖談上聲食也衄女六切音朒鼻出血也麴音曲酒媒拒音巨違也諱音誨隱也即違反前所行事隱覆過失擢音濁舉也用也喂音威恐也跌杜結切音絰差也足失據也音弋麥志音至記也黑子為志𠿘音嘴鳥喙俗作𠿘狡音攪少狗也胸奴地有狡犬巨口而黑身鴟抽知切音笞鴟梟惡鳥一名隻狐晝則無見夜出飛噉蚊虻搦音諾按也櫨音盧欂櫨柱上柎也即今之斗也惻初力切音測愴也愴音昌悽愴悲惻貌謂無慈悲悽愴之心也第十三卷孑音結課科去聲試也探也擡音臺擡舉也綽昌入聲寬口也瓨與缸同長頸罌受十升姑音孤姑息苟安也謂苟且之心安人之心也慝惕德切音忒惡也又隱惡也暴與同猛也橫也急也匱具位切音餽乏也竭也第十四卷𨷲與鑰同妥唾上聲安也平也帖也噎音謁食窒氣不通也閣古沓切音蛤內中小門出入閨閣宮中門小者曰閨上圓下方如閨故曰閨門黜音出貶斥也鞕同硬白楊樹華楊略有四種白楊葉圓如黎皮白木似楊故曰白楊青楊葉長赤楊霜降則葉赤黃楊木性堅難長楊柳華是垂條細柳也禪音單衣無裏玦音決環之不周者名玦㺲同鈕第十五卷絛音叨編絲繩也褶質涉切音摺衣褶襻音盼衣下絲褰音牽揭衣也擪音葉持也按也與臍同音傳腓腸也踝華上聲脛兩旁內外曰踝廣韻足骨也蹲音存踞也跪葵上聲拜跪也䏶皮上聲䏶胵胃脘也尻考平聲脊梁盡處是也臀徒孫切音豚腿靨靨音葉頰輔也緻音智密也齗音銀齒根肉也抑音益按也密也治也即密治也挑他雕切音祧挑撥又取也五欲一財欲財即世間一切資財也謂人以財物為養己之資故至貪求戀著不捨是為財欲二色欲色即世間青黃赤白及男女等色也謂人以色悅情適意故至貪求戀著不能出離三界是為色欲三飲食欲飲食即世間肴膳衆味也謂人必假飲食資身活命故至貪求樂著無厭是為飲食欲四名欲名即世間之聲名也謂人因聲名能顯親榮己故至貪求樂著而不知止是為名欲五睡眠欲睡眠即情識昏昧而睡眠也謂人之睡眠亦有時節若怠墯放縱樂著無厭是為睡眠欲狼狽上音郎下音輩狼前二足長後二足短狽前二足短後二足長狼無狽不立狽無狼不行若相離則進退不得矣㗘㗱上音博下音集嗗鳥八切音穵飲聲又噢嗗啖嚙聲䑛時上聲以舌取物食也溉音戲取也一曰拭也又音蓋義同䑛同噀瘞音意埋也藏也跣先上聲徒足履也靿於教切音拗鞾靿靴俗字𩍓音雍鞾𩍓窄音謫狹也迫也稕朱閨切肫去聲束稈也稈干字上聲禾莖也第十六卷嶮同險訾音咨毀也囂吁驕切音梟喧也獷古猛切音礦粗惡貌言無親也嗅𮌎去聲鼻審氣又休去聲義同蕪音無荒也荒唐污也馚音焚馚馧香氣也馥音福香氣也懊烏考切奧上聲懊惱也又音奧悔恨也怙胡上聲怙恃父亡曰失怙母亡曰失恃犛音茅
